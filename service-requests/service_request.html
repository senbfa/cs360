<script src="../assets/servicesheet.js"></script>
<script src="../assets/search.js"></script>
<script>
const qs = new URLSearchParams(location.search);
ssSetCtx({
  action: qs.get('action') || '',
  facility: qs.get('facility') || '',
  drawing: qs.get('drawing') || '',
  customer: (qs.get('customer') || 'Meridian Foods PLC').replace(/\+/g, ' '),
  ref: qs.get('ref') || ''
});

function renderCtx(){
  document.getElementById('ctxBanner').innerHTML = ssCtxBannerHTML();
}

function renderNav(activeId){
  const nav = document.getElementById('reqnav');
  nav.innerHTML = '';
  SS_REQUESTS.forEach(r => {
    const d = document.createElement('div');
    d.className = 'rn' + (r.id === activeId ? ' on' : '');
    d.textContent = r.label;
    d.addEventListener('click', () => selectRequest(r.id));
    nav.appendChild(d);
  });
}

function selectRequest(id){
  ssCtx.action = id;
  const params = new URLSearchParams(location.search);
  params.set('action', id);
  history.replaceState(null, '', location.pathname + '?' + params.toString());
  renderNav(id);
  const req = SS_REQUESTS.find(r => r.id === id);
  document.getElementById('pageSub').textContent = req.label;
  const host = document.getElementById('formHost');
  const formFn = SS_FORMS[id];
  host.innerHTML = `
    <div class="banner-success" id="successBanner">
      <div class="bs-icon">&#10003;</div>
      <div><strong id="successTitle">Request submitted</strong><div id="successBody" style="margin-top:2px"></div></div>
    </div>
    <form id="reqForm">${formFn ? formFn() : ''}</form>
    <div class="formfoot">
      <button type="button" class="btn" onclick="goBack()">Cancel</button>
      <button type="button" class="btn btn-primary" id="submitBtn" onclick="submitRequest()">Submit Request</button>
    </div>`;
  ssWireCovenantResult(host);
}

function goBack(){
  if (document.referrer && document.referrer.indexOf(location.host) !== -1){
    history.back();
  } else if (ssCtx.facility && SS_FACILITIES[ssCtx.facility]){
    location.href = '../facilities/facility_' + (ssCtx.facility === 'AA250114F1V01' ? '1' : ssCtx.facility === 'AA250310F1V01' ? '2' : '3') + '.html';
  } else {
    location.href = '../customer_360.html';
  }
}

function submitRequest(){
  const form = document.getElementById('reqForm');
  if (!ssValidate(form)) return;
  const ref = ssGenRef();
  document.getElementById('successTitle').textContent = `Request submitted — ${ref}`;
  document.getElementById('successBody').textContent = 'Routed to Credit Operations for review. You will be notified once actioned.';
  document.getElementById('successBanner').classList.add('on');
  document.getElementById('submitBtn').setAttribute('disabled', 'disabled');
  form.querySelectorAll('input,select,textarea,button').forEach(el => el.setAttribute('disabled', 'disabled'));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderCtx();
const initial = SS_REQUESTS.some(r => r.id === ssCtx.action) ? ssCtx.action : 'new-drawing';
selectRequest(initial);
</script>
</body>
