<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Temenos Corporate Banking</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  .launch{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;background:linear-gradient(160deg,var(--navy),var(--blue))}
  .launch .brandbig{color:#fff;font-size:30px;font-weight:700}
  .launch .tag{color:var(--blue-100);font-size:14px;margin-top:-14px}
  .launch .card{background:var(--surface);border-radius:var(--radius);padding:26px 30px;width:420px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .launch .row{display:flex;align-items:center;justify-content:space-between;padding:14px 4px;border-bottom:1px solid var(--border);cursor:pointer}
  .launch .row:last-child{border-bottom:none}
  .launch .row:hover .nm{color:var(--blue)}
  .launch .nm{font-weight:600;font-size:14px}
  .launch .ds{font-size:12px;color:var(--text2)}
  .launch .go{color:var(--blue);font-size:18px}
</style>
</head>
<body>
<div class="launch">
  <div class="brandbig">temenos Corporate Banking</div>
  <div class="tag">Corporate Banking Officer Workbench</div>
  <div class="card">
    <div class="row" onclick="location.href='customer_360.html'">
      <div><div class="nm">Meridian Foods PLC</div><div class="ds">CUST 482211 · Customer 360</div></div>
      <div class="go">→</div>
    </div>
  </div>
</div>
</body>
</html>
